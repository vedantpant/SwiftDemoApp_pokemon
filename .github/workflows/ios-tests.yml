name: iOS Automation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  xcuitest:
    name: XCUITest Suite
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Boot simulator
        run: |
          xcrun simctl list devices available
          UDID=$(xcrun simctl list devices available | grep "iPhone 16" | head -1 | grep -E -o '[0-9A-F-]{36}')
          echo "UDID: $UDID"
          xcrun simctl boot "$UDID" || true

      - name: Run XCUITests
        run: |
          xcodebuild test \
            -project SwiftDemoApp/SwiftDemoApp.xcodeproj \
            -scheme SwiftDemoApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath TestResults.xcresult \
            -enableCodeCoverage YES

      - name: Upload xcresult
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xcresult
          path: TestResults.xcresult

  appium_note:
    name: Appium Tests (Local Only)
    runs-on: ubuntu-latest
    steps:
      - name: Note
        run: |
          echo "Appium tests require a pre-built .app file and running simulator."
          echo "Run locally with: pytest tests/ -v"
          echo "See README for local setup instructions."
